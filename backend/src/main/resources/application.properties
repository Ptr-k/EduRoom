spring.application.name=EduRoom
server.port=8080
debug=true

# config de la bbdd
spring.datasource.url=jdbc:mariadb://localhost:3306/eduroom_db
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=8f12a3b4c5d6e7f8g9h0i1j2k3l4m5n6o7p8q9r0s1t2u3v4w5x6y7z8A9B0C1D2
app.jwt.expiration=86400000

# frontend URL para QR codes
app.frontend.url=http://localhost:3000

# logging
logging.level.com.eduroom=DEBUG
logging.level.org.springframework.security=DEBUG